<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Haedurio Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 text-gray-900">
  <div class="max-w-5xl mx-auto p-6">
    <h1 class="text-2xl font-black mb-4">Haedurio Admin</h1>

    <!-- Login -->
    <div id="login-box" class="bg-white rounded-xl shadow p-5 mb-6">
      <h2 class="text-lg font-bold mb-3">Admin Login</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <input id="email" class="border rounded-lg p-2" placeholder="email" type="email" />
        <input id="password" class="border rounded-lg p-2" placeholder="password" type="password" />
      </div>
      <div class="mt-3 flex gap-2">
        <button id="btn-login" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold">Login</button>
        <button id="btn-logout" class="bg-gray-200 px-4 py-2 rounded-lg font-bold hidden">Logout</button>
      </div>
      <p id="login-msg" class="text-sm text-gray-500 mt-2"></p>
    </div>

    <!-- List -->
    <div class="bg-white rounded-xl shadow p-5">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-bold">Inquiries</h2>
        <button id="btn-refresh" class="bg-gray-900 text-white px-3 py-2 rounded-lg font-bold">Refresh</button>
      </div>
      <div id="list" class="space-y-4"></div>
    </div>
  </div>

  <script>
    // ✅ 너의 값으로 변경
    const SUPABASE_URL = "https://ohucwneefolyepuollow.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9odWN3bmVlZm9seWVwdW9sbG93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0NzU4MzEsImV4cCI6MjA4NDA1MTgzMX0.V8lGqYLULfxFo-I-VEtblyGqbDP3HYz8f5bNjFlXmt8";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const $ = (id) => document.getElementById(id);
    const escapeHtml = (s) => String(s ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");

    async function refreshList() {
      $("list").innerHTML = `<div class="text-gray-400">Loading...</div>`;

      const { data: sessionData } = await supabaseClient.auth.getSession();
      if (!sessionData?.session) {
        $("list").innerHTML = `<div class="text-gray-400">Please login.</div>`;
        return;
      }

      // ✅ 관리자만 RLS 통과해서 보임(contact 포함, secret 포함)
      const { data, error } = await supabaseClient
  .from("inquiries")
  .select("id, created_at, name, contact, message, is_secret, answer, status")
  .order("created_at", { ascending: false })
  .limit(50);

      if (error) {
        $("list").innerHTML = `<div class="text-red-600 text-sm">Error: ${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        $("list").innerHTML = `<div class="text-gray-400">No inquiries.</div>`;
        return;
      }

            $("list").innerHTML = "";
      data.forEach((q, idx) => {
        const wrap = document.createElement("div");
        wrap.className = "border rounded-xl p-4 bg-gray-50";

        const created = new Date(q.created_at).toLocaleString();
        const secretBadge = q.is_secret ? `<span class="text-xs px-2 py-1 rounded bg-red-100 text-red-700 font-bold">SECRET</span>` : "";

        const safeName = escapeHtml(q.name ?? "");
        const safeContact = escapeHtml(q.contact ?? "");
        const safeMessage = escapeHtml(q.message ?? "");
        const safeAnswer = escapeHtml(q.answer ?? "");

        wrap.innerHTML = `
          <div class="flex items-center justify-between gap-2">
            <div class="font-bold">${safeName} ${secretBadge}</div>
            <div class="text-xs text-gray-500">${created}</div>
          </div>

          <div class="mt-2 text-sm">
            <div class="text-gray-700"><span class="font-bold">Contact:</span> ${safeContact}</div>
            <div class="text-gray-700 mt-1"><span class="font-bold">Q:</span> ${safeMessage}</div>
          </div>

          <div class="mt-3">
            <label class="text-sm font-bold">Answer</label>
            <textarea class="w-full border rounded-lg p-2 mt-1" rows="3" data-idx="${idx}">${safeAnswer}</textarea>
            <button class="mt-2 bg-blue-600 text-white px-3 py-2 rounded-lg font-bold" data-save="${idx}">Save Answer</button>
            <p class="text-xs text-gray-500 mt-1" data-msg="${idx}"></p>
          </div>
        `;

        $("list").appendChild(wrap);

        wrap.querySelector(`[data-save="${idx}"]`).addEventListener("click", async () => {
          const textarea = wrap.querySelector(`textarea[data-idx="${idx}"]`);
          const msg = wrap.querySelector(`[data-msg="${idx}"]`);
          const newAnswer = textarea.value;

          msg.textContent = "Saving...";
          msg.className = "text-xs text-gray-500 mt-1";

          const { error } = await supabaseClient
            .from("inquiries")
            .update({ answer: newAnswer, status: "answered" })
            .eq("id", q.id);

          if (error) {
            msg.textContent = "Error: " + error.message;
            msg.className = "text-xs text-red-600 mt-1";
            return;
          }
          msg.textContent = "Saved.";
          msg.className = "text-xs text-green-700 mt-1";
        });
      });

    }

    async function onLogin() {
      const email = $("email").value.trim();
      const password = $("password").value;

      $("login-msg").textContent = "Logging in...";

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        $("login-msg").textContent = "Error: " + error.message;
        return;
      }

      $("login-msg").textContent = "Logged in.";
      $("btn-logout").classList.remove("hidden");
      await refreshList();
    }

    async function onLogout() {
      await supabaseClient.auth.signOut();
      $("login-msg").textContent = "Logged out.";
      $("btn-logout").classList.add("hidden");
      $("list").innerHTML = `<div class="text-gray-400">Please login.</div>`;
    }

    $("btn-login").addEventListener("click", onLogin);
    $("btn-logout").addEventListener("click", onLogout);
    $("btn-refresh").addEventListener("click", refreshList);

    // Auto refresh if already logged in
    supabaseClient.auth.onAuthStateChange((_event, session) => {
      if (session) {
        $("btn-logout").classList.remove("hidden");
        refreshList();
      } else {
        $("btn-logout").classList.add("hidden");
        $("list").innerHTML = `<div class="text-gray-400">Please login.</div>`;
      }
    });
  </script>
</body>
</html>
